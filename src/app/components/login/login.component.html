<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 overflow-hidden">
        <img src="medical_banner.jpg" class="card-img-top img-fluid" alt="Banner Médico" style="max-height: 200px; object-fit: cover;">
        <div class="card-body p-4">
          <h2 class="text-center text-primary mb-4 fw-bold">🏥 Ingreso de Pacientes</h2>
          
          <div *ngIf="error" class="alert alert-danger border-0 shadow-sm" role="alert">
            ⚠️ {{ error }}
          </div>

          <form (ngSubmit)="login()">
            <div class="mb-3">
              <label for="usuario" class="form-label fw-semibold text-secondary">Usuario</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">👤</span>
                <input 
                  type="text" 
                  id="usuario"
                  class="form-control bg-light border-start-0 ps-2" 
                  [(ngModel)]="usuario" 
                  name="usuario"
                  placeholder="Ingrese su usuario (admin)"
                  required
                >
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold text-secondary">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">🔒</span>
                <input 
                  type="password" 
                  id="password"
                  class="form-control bg-light border-start-0 ps-2" 
                  [(ngModel)]="password" 
                  name="password"
                  placeholder="Ingrese su contraseña (1234)"
                  required
                >
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-pill mt-3 shadow-sm">
              Ingresar al Portal
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
