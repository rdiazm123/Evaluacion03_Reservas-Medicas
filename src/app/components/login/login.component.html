<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Ingreso Paciente</h3>

</div>

<div class="card-body">

<form #formLogin="ngForm" (ngSubmit)="login()">


<div class="mb-3">

<label>Usuario</label>

<input
class="form-control"
type="text"
name="usuario"
[(ngModel)]="usuario"
required>

</div>


<div class="mb-3">

<label>Contraseña</label>

<input
class="form-control"
type="password"
name="password"
[(ngModel)]="password"
required>

</div>


<button
class="btn btn-success w-100"
[disabled]="formLogin.invalid">

Ingresar

</button>


</form>

</div>

</div>

</div>
