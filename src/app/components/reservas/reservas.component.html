<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">📅 Reservar Hora Médica</h3>
    </div>
    <div class="card-body">
      <form #reservaForm="ngForm">
        <div class="mb-3">
          <label for="fecha" class="form-label">Seleccione la fecha de su cita:</label>
          <input
            id="fecha"
            type="date"
            class="form-control"
            name="fecha"
            [(ngModel)]="reserva.fecha"
            [min]="fechaActual"
            required
          />
        </div>
        <button type="submit" class="btn btn-success" [disabled]="!reservaForm.valid">
          Confirmar Reserva
        </button>
      </form>
    </div>
  </div>
</div>
